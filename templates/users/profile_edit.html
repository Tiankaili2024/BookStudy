{% extends 'base.html' %}{% block title %}编辑资料{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6"><div class="card p-4"><h3>编辑个人资料</h3>
<form method="post" enctype="multipart/form-data">{% csrf_token %}
{% for field in form %}
<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small">{{ field.errors }}</div>{% endif %}</div>
{% endfor %}
<button type="submit" class="btn btn-primary">保存</button>
<a href="{% url 'profile' %}" class="btn btn-secondary">取消</a>
</form></div></div></div>{% endblock %}
