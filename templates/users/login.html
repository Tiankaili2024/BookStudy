{% extends 'base.html' %}{% block title %}登录{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5 col-lg-4">
<div class="card p-4"><h3 class="text-center mb-4">用户登录</h3>
<form method="post">{% csrf_token %}
<div class="mb-3"><label class="form-label">用户名</label>{{ form.username }}</div>
<div class="mb-3"><label class="form-label">密码</label>{{ form.password }}</div>
{% if form.non_field_errors %}<div class="text-danger small">{{ form.non_field_errors }}</div>{% endif %}
<button type="submit" class="btn btn-primary w-100">登录</button></form>
<p class="text-center mt-3">没有账号？<a href="{% url 'register' %}">立即注册</a></p>
</div></div></div>{% endblock %}
