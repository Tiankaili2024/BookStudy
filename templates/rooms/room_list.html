{% extends 'base.html' %}{% block title %}自习室列表{% endblock %}
{% block content %}
<h3 class="mb-4">自习室列表</h3>
<div class="row g-3">
{% for room in rooms %}
<div class="col-lg-3 col-md-4 col-6">
  <div class="card p-3 h-100">
    <h5>{{ room.name }}</h5>
    <p class="text-muted mb-1"><i class="bi bi-geo-alt"></i> {{ room.building }} {{ room.floor }}F</p>
    <p class="text-muted mb-1"><i class="bi bi-people"></i> {{ room.capacity }} 座位</p>
    <span class="badge bg-{% if room.room_type == 'silent' %}secondary{% elif room.room_type == 'discussion' %}warning{% else %}primary{% endif %}">{{ room.get_room_type_display }}</span>
    <a href="{% url 'room_detail' room.pk %}" class="btn btn-outline-primary btn-sm mt-3 w-100">选择座位</a>
  </div>
</div>
{% empty %}<p class="text-muted">暂无开放自习室</p>{% endfor %}
</div>{% endblock %}
