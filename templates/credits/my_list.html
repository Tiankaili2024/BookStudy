{% extends 'base.html' %}{% block title %}积分明细{% endblock %}{% block content %}
<h3>积分明细 <span class="badge fs-5 {% if score >= 120 %}badge-diamond{% elif score >= 100 %}badge-gold{% else %}badge-normal{% endif %}">{{ score }}分</span></h3>
<table class="table"><thead><tr><th>时间</th><th>类型</th><th>变动</th><th>余额</th><th>说明</th></tr></thead><tbody>
{% for r in records %}<tr><td>{{ r.created_at|date:'m-d H:i' }}</td><td>{{ r.get_type_display }}</td><td style="color:{% if r.change > 0 %}green{% else %}red{% endif %}">{{ r.change|stringformat:'+d' }}</td><td>{{ r.balance }}</td><td>{{ r.description }}</td></tr>{% endfor %}
</tbody></table>{% endblock %}
